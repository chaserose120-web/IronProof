<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronProofService Offline</title>
    <meta name="theme-color" content="#15130f" />
    <style>
      :root {
        color: #f7f4ed;
        background: #15130f;
        font-family: Arial, sans-serif;
      }

      body {
        align-items: center;
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.06);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 0.9;
      }

      p {
        margin: 0;
        color: #c8cbd2;
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IronProof is offline.</h1>
      <p>
        The app shell is installed, but job records, photos, diagnostics, and auth need a network connection.
        Reconnect and refresh to keep working.
      </p>
    </main>
  </body>
</html>
